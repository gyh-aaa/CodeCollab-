server:
  port: 8080

spring:
  application:
    name: codecollab-backend
  profiles:
    default: demo
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none

app:
  jwt:
    issuer: codecollab
    secret: CodeCollabJwtSecretForDevOnlyChangeItInProduction2026
    expiration: 2h
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*
