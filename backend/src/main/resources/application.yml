server:
  port: 8080

spring:
  application:
    name: codecollab-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_collab?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: codecollab
    secret: CodeCollabJwtSecretForDevOnlyChangeItInProduction2026
    expiration: 2h
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
